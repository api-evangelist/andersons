aid: andersons
name: The Andersons
description: >-
  The Andersons, Inc. is a diversified agribusiness company headquartered in Maumee, Ohio, with operations in grain, plant nutrients, and renewables. Founded in 1947, the company operates grain elevators, fertilizer and nutrient businesses, and ethanol facilities across the United States and Canada. The Andersons does not publish a public developer API or developer portal. Business integrations are handled through EDI and direct partner arrangements.
